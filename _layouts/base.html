<!DOCTYPE html>
<html>
	
	{%- include head.html -%}

	<body>
		{%- include header.html -%}

		<main>
			<div>
				{{ content }}
			</div>
		</main>

		{%- include footer.html -%}

		<style>
			html {
				text-align: center;
				display: flex;
  				justify-content: center;
			}

			body {
				background-color: black;
				color: white;
				font-family: "Courier New", Courier, sans-serif;

				font-size: 100%;
				overflow-wrap: break-word;

				padding-left: 4%;
				padding-right: 4%;

				margin: 0 auto;

				width: 100vh;
				@media (orientation: portrait) {
					width: 100vw;
				}

				@media (64em < width) {
					font-size: 125%;
				}
			}

			a {
				color: white;
			}

			ul {
				display: inline-block;
				list-style-type: "- ";
			}

			li {
				text-align: left;
			}

			img {
				max-width: 100%;
				max-height: 100%;

				image-rendering: pixelated;
			}

			blockquote {
				border: 1em solid;
				padding: 10%;
				font-style: italic;
			}

			.thumbnail {
				image-rendering: auto;
			}

			.post-meta {
				font-size: 90%;
			}

			.img-rendering-auto {
				image-rendering: auto;
			}

			.img_no_max_height {
				max-height: none !important;
			}

			.clr-m-mw, .clr-m-mw * {
				color: #fbd3e4;
			}
			.clr-r-mw, .clr-r-mw * {
				color: #fce6cd;
			}
			.clr-b-mw, .clr-b-mw * {
				color: #c9c0df;
			}
			.clr-w-mw, .clr-w-mw * {
				color: #ffffff;
			}

			.clr-m-w, .clr-m-w * {
				color: #f39ec2;
			}
			.clr-r-w, .clr-r-w * {
				color: #f49b75;
			}
			.clr-b-w, .clr-b-w * {
				color: #9182bc;
			}
			.clr-w-w, .clr-w-w * {
				color: #ffffff;
			}
			
			.clr-m, .clr-m * {
				color: #e6007f;
			}
			.clr-r, .clr-r * {
				color: #e70012;
			}
			.clr-b, .clr-b * {
				color: #222088;
			}
			.clr-w, .clr-w * {
				color: #ffffff;
			}

			:root {
				--clr-feral-rabbit: hsl(357deg, 100%, 38%);
				--clr-cyanic-siblings: hsl(194deg, 100%, 47%);
			}

			.clr-feral-rabbit, .clr-feral-rabbit * {
				color: var(--clr-feral-rabbit);
			}
			.clr-feral-rabbit-mw, .clr-feral-rabbit-mw * {
				color: hsl(from var(--clr-feral-rabbit) h s calc(l*1.75));
			}
			.clr-cyanic-siblings, .clr-cyanic-siblings * {
				color: var(--clr-cyanic-siblings);
			}
			.clr-cyanic-siblings-w, .clr-cyanic-siblings-w * {
				color: hsl(from var(--clr-cyanic-siblings) h s calc(l*1.50));
			}
			.clr-cyanic-siblings-mw, .clr-cyanic-siblings-mw * {
				color: hsl(from var(--clr-cyanic-siblings) h s calc(l*1.75));
			}
			
		</style>
	</body>
</html>
